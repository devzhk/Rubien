name: CI

on: [push, pull_request]

jobs:
  macos:
    name: macOS
    # macos-26 (Tahoe) matches the maintainer's local environment and is
    # GA on GitHub Actions. macos-14 was scheduled for full deprecation
    # by Nov 2, 2025. macos-latest is avoided so version skew is
    # explicit, not silent.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    # Pinned to the latest stable Swift line as of 2026-05. The
    # major.minor tag (no patch) picks up 6.3.x bugfixes automatically,
    # so this only needs a manual bump when 6.4 ships. Floor for this
    # repo is Swift 6.1 — GRDB 7.10 declares tools-version 6.1.
    container: swift:6.3-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        # poppler/cairo/gdk-pixbuf power RubienPDFKit's Linux backend.
        run: |
          apt-get update
          apt-get install -y libsqlite3-dev libpoppler-glib-dev libcairo2-dev libgdk-pixbuf-2.0-dev pkg-config
      - name: Build rubien-cli
        # RubienCLITests shell out to .build/debug/rubien-cli via Process,
        # but the test target doesn't declare the executable as an SPM dep
        # (it's a runtime artifact, not a link-time one). Build it explicitly
        # before tests run — otherwise skipIfBinaryMissing() silently skips
        # every CLI test.
        run: swift build --product rubien-cli
      - name: Test (Core + CLI)
        # Skipping RubienPDFKitTests on Linux — corelibs-xctest hangs with
        # poppler-linked bundles. macOS runs the parity tests in full.
        # See Docs/Linux-PDF-Backend.md.
        run: swift test --filter 'RubienCoreTests|RubienCLITests'
