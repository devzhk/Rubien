name: CI

on: [push, pull_request]

jobs:
  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    # Pinned to the latest stable Swift line as of 2026-05. The
    # major.minor tag (no patch) picks up 6.3.x bugfixes automatically,
    # so this only needs a manual bump when 6.4 ships. Floor for this
    # repo is Swift 6.1 — GRDB 7.10 declares tools-version 6.1.
    container: swift:6.3-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          apt-get update
          apt-get install -y libsqlite3-dev pkg-config
      - name: Build RubienCore
        run: swift build --target RubienCore
      # Test step intentionally omitted in Phase 1: SwiftPM compiles ALL test
      # targets up-front before applying --filter, and RubienSyncTests /
      # RubienTests / RubienCLITests pull in CloudKit / AppKit / RubienSync.
      # Phase 2 adds conditional `RubienSync` linkage in Package.swift, after
      # which `swift test --filter RubienCoreTests` becomes viable on Linux.
