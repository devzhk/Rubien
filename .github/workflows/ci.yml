name: CI

# Docs-only changes don't need two Swift runners: markdown edits and the
# release-time appcast commit are skipped. A push mixing docs with code still
# runs (paths-ignore only skips when EVERY changed file matches). Safe while
# main has no required status checks — revisit if branch protection is added,
# since skipped runs leave required checks permanently pending.
on:
  push:
    paths-ignore:
      - "**.md"
      - "Docs/appcast.xml"
  pull_request:
    paths-ignore:
      - "**.md"
      - "Docs/appcast.xml"

jobs:
  macos:
    name: macOS
    # macos-26 (Tahoe) matches the maintainer's local environment and is
    # GA on GitHub Actions. macos-14 was scheduled for full deprecation
    # by Nov 2, 2025. macos-latest is avoided so version skew is
    # explicit, not silent.
    runs-on: macos-26
    # Cap runaway hangs. `swift test` here intermittently deadlocks (a flaky
    # WKWebView/CLI-test race); healthy runs finish in ~4 min, but an unbounded
    # hang burns GitHub's 6h default on a 10x-billed macOS runner — two of those
    # is what tripped the Actions spending limit. 10 min passes every healthy run
    # while capping a hang at 10 min instead of 360.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    # Backstop against a runaway; this job normally finishes in ~6 min.
    timeout-minutes: 10
    # Pinned to the latest stable Swift line as of 2026-05. The
    # major.minor tag (no patch) picks up 6.3.x bugfixes automatically,
    # so this only needs a manual bump when 6.4 ships. Floor for this
    # repo is Swift 6.1 — GRDB 7.10 declares tools-version 6.1.
    container: swift:6.3-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Verify generated CLI version is in sync
        # git-free comparison: `git diff` fails inside the swift:6.3-jammy
        # container (dubious-ownership → "not a git repository"). Regenerate
        # and compare the bytes directly instead.
        run: |
          cp Sources/RubienCLI/GeneratedVersion.swift /tmp/gv-committed.swift
          ./scripts/generate-cli-version.sh
          diff -u /tmp/gv-committed.swift Sources/RubienCLI/GeneratedVersion.swift \
            || (echo "::error::GeneratedVersion.swift is stale. Run ./scripts/generate-cli-version.sh and commit." && exit 1)
      - name: Install system deps
        # poppler/cairo/gdk-pixbuf power RubienPDFKit's Linux backend.
        run: |
          apt-get update
          apt-get install -y libsqlite3-dev libpoppler-glib-dev libcairo2-dev libgdk-pixbuf-2.0-dev pkg-config
      - name: Build rubien-cli
        # RubienCLITests shell out to .build/debug/rubien-cli via Process,
        # but the test target doesn't declare the executable as an SPM dep
        # (it's a runtime artifact, not a link-time one). Build it explicitly
        # before tests run — otherwise skipIfBinaryMissing() silently skips
        # every CLI test.
        run: swift build --product rubien-cli
      - name: Test (Core + CLI)
        # Skipping RubienPDFKitTests on Linux — corelibs-xctest hangs with
        # poppler-linked bundles. macOS runs the parity tests in full.
        # See Docs/Linux-PDF-Backend.md.
        run: swift test --filter 'RubienCoreTests|RubienCLITests'

  web:
    name: Web port (typecheck + tests)
    # The browser port under web/ is pure Node/TypeScript — no Swift, no PDF
    # system libs. Without this job its vitest suite and tsc type-check never
    # run in CI and regressions land silently.
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Vite 7 requires Node >= 20.19; 22 is the maintainer's local line.
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Type-check
        working-directory: web
        run: npm run typecheck
      - name: Test
        working-directory: web
        run: npm test

  mcp-e2e:
    name: MCP server ↔ CLI e2e (Linux)
    # The npm↔CLI contract check: build rubien-cli in the same pinned
    # container the Linux job uses, then run the npm server's full vitest
    # suite against it — including the stdio e2e that boots the built server,
    # passes the MIN_CLI_BUILD startup guard, and asserts the live 27-tool
    # catalog. Catches server/CLI drift (renamed subcommands, envelope shape,
    # version-guard skew) that neither side's isolated suite can see.
    runs-on: ubuntu-22.04
    # Backstop against a runaway; this job normally finishes in ~6 min.
    timeout-minutes: 10
    container: swift:6.3-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        # Same PDF-backend deps as the linux job (the CLI links RubienPDFKit),
        # plus curl for the Node installer.
        run: |
          apt-get update
          apt-get install -y libsqlite3-dev libpoppler-glib-dev libcairo2-dev libgdk-pixbuf-2.0-dev pkg-config curl
      - name: Install Node 20
        # mcp-server requires Node >= 20; jammy's apt node is far older.
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          node --version
      - name: Build rubien-cli
        # The stdio e2e resolves the CLI at ../.build/debug/rubien-cli
        # relative to mcp-server/ and skips itself if it's missing — build it
        # so the e2e actually runs.
        run: swift build --product rubien-cli
      - name: npm ci + build + test
        working-directory: mcp-server
        env:
          # Hermetic library for the CLI the e2e spawns — don't let a
          # container-default XDG path leak state between steps.
          RUBIEN_LIBRARY_ROOT: /tmp/rubien-e2e-lib
        run: |
          npm ci
          npm run build
          npm test
